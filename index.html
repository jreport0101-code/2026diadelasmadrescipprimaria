<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌸 Feliz día Mamás de primaria 🌸</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:linear-gradient(to bottom,#fff0f6,#ffe4ec);

    font-family:Arial, Helvetica, sans-serif;

    overflow-x:hidden;
}

/* ENCABEZADO */

header{

    background:linear-gradient(90deg,#ff4fa3,#ff79c6);

    color:white;

    text-align:center;

    padding:35px;

    font-size:55px;

    font-weight:bold;

    box-shadow:0px 5px 20px rgba(0,0,0,0.2);
}

/* SUBTITULO */

.subtitulo{

    text-align:center;

    padding:20px;

    font-size:26px;

    color:#555;
}

/* GALERIA */

.galeria{

    width:100%;

    overflow:hidden;

    margin-top:20px;
}

/* SLIDER */

.slider{

    display:flex;

    width:max-content;

    animation:scroll 120s linear infinite;
}

/* IMAGENES */

.slider img{

    width:320px;

    height:320px;

    object-fit:cover;

    margin:15px;

    border-radius:30px;

    box-shadow:
    0px 0px 20px rgba(0,0,0,0.25);

    transition:0.4s;
}

.slider img:hover{

    transform:scale(1.08);
}

/* ANIMACION */

@keyframes scroll{

    0%{
        transform:translateX(0);
    }

    100%{
        transform:translateX(-50%);
    }
}

/* MENSAJE */

.mensaje{

    width:85%;

    margin:60px auto;

    background:white;

    border-radius:30px;

    padding:50px;

    text-align:center;

    box-shadow:
    0px 0px 25px rgba(0,0,0,0.15);
}

.mensaje h2{

    color:#ff4fa3;

    font-size:42px;

    margin-bottom:25px;
}

.mensaje p{

    color:#444;

    font-size:24px;

    line-height:1.8;
}

/* FOOTER */

footer{

    text-align:center;

    padding:50px;

    font-size:38px;

    color:#ff4fa3;

    font-weight:bold;
}

/* FLORES */

.flor{

    position:fixed;

    top:-50px;

    animation:caer linear infinite;

    z-index:999;
}

@keyframes caer{

    0%{

        transform:translateY(-50px) rotate(0deg);
    }

    100%{

        transform:translateY(120vh) rotate(360deg);
    }
}

/* BOTON MUSICA */

#playButton{

    position:fixed;

    top:20px;

    right:20px;

    z-index:9999;
}

#playButton button{

    background:#ff4fa3;

    color:white;

    border:none;

    padding:15px 25px;

    border-radius:20px;

    font-size:18px;

    cursor:pointer;

    box-shadow:0 0 15px rgba(0,0,0,0.3);

    transition:0.3s;
}

#playButton button:hover{

    transform:scale(1.05);

    background:#ff79c6;
}

/* RESPONSIVE */

@media(max-width:700px){

header{

    font-size:34px;

    padding:25px;
}

.subtitulo{

    font-size:20px;
}

.slider img{

    width:220px;

    height:220px;
}

.mensaje{

    width:92%;

    padding:30px;
}

.mensaje h2{

    font-size:30px;
}

.mensaje p{

    font-size:20px;
}

footer{

    font-size:28px;
}

}

</style>

</head>

<body>

<!-- AUDIO -->

<audio id="musica" loop>

<source src="musica.mp3" type="audio/mpeg">

</audio>

<!-- BOTON MUSICA -->

<div id="playButton">

<button onclick="iniciarMusica()">

🌸 Tocar música 🌸

</button>

</div>

<script>

/* INICIAR MUSICA */

function iniciarMusica(){

const audio=document.getElementById("musica");

audio.volume=0.5;

audio.play();

document.getElementById("playButton").style.display="none";

}

/* FLORES */

for(let i=0;i<25;i++){

    let flor=document.createElement("div");

    flor.innerHTML="🌸";

    flor.classList.add("flor");

    flor.style.left=Math.random()*100+"vw";

    flor.style.fontSize=(Math.random()*25+15)+"px";

    flor.style.animationDuration=(Math.random()*10+8)+"s";

    flor.style.opacity=Math.random();

    document.body.appendChild(flor);
}

</script>

<!-- TITULO -->

<header>

🌸 Feliz día Mamás de primaria 🌸

</header>

<!-- SUBTITULO -->

<div class="subtitulo">

Un regalo hecho con mucho amor ❤️

</div>

<!-- GALERIA -->

<div class="galeria">

<div class="slider" id="slider">

</div>

</div>

<!-- MENSAJE -->

<div class="mensaje">

<h2>

❤️ Gracias Mamás ❤️

</h2>

<p>

Gracias por todo su amor, paciencia y dedicación.  
Gracias por acompañar, enseñar y cuidar siempre con tanto cariño.  

Este pequeño detalle fue preparado con mucho amor para ustedes 🌸

</p>

</div>

<!-- FOOTER -->

<footer>

🌸 Feliz Día de las Madres 🌸

</footer>

<script>

/* CARGAR IMAGENES AUTOMATICAMENTE */

const slider=document.getElementById("slider");

for(let i=1;i<=100;i++){

    let img=document.createElement("img");

    img.src=`foto${i}.jpeg`;

    img.onerror=function(){

        this.remove();
    };

    slider.appendChild(img);
}

</script>

</body>

</html>
