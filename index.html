<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌸 Feliz día Mamás de primaria 🌸</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:
linear-gradient(
to bottom,
#fff0f6,
#ffe4ec,
#fff5fa
);

font-family:Arial, Helvetica, sans-serif;

overflow-x:hidden;
}

/* TITULO */

header{

background:linear-gradient(90deg,#ff4fa3,#ff79c6);

color:white;

text-align:center;

padding:35px;

font-size:50px;

font-weight:bold;

box-shadow:0 0 20px rgba(0,0,0,0.2);
}

/* SUB */

.subtitulo{

text-align:center;

padding:20px;

font-size:24px;

color:#555;
}

/* BOTON */

.boton-musica{

text-align:center;

margin-bottom:30px;
}

.boton-musica button{

background:linear-gradient(90deg,#ff4fa3,#ff79c6);

color:white;

border:none;

padding:18px 35px;

font-size:22px;

border-radius:30px;

cursor:pointer;

box-shadow:0 0 20px rgba(0,0,0,0.25);

transition:0.3s;
}

.boton-musica button:hover{

transform:scale(1.05);
}

/* COLLAGE */

.collage{

column-count:3;

column-gap:15px;

padding:20px;
}

.collage img{

width:100%;

margin-bottom:15px;

border-radius:25px;

box-shadow:0 0 15px rgba(0,0,0,0.2);

transition:0.3s;

animation:flotar 7s ease-in-out infinite;

break-inside:avoid;
}

.collage img:hover{

transform:scale(1.03);
}

/* FLOTAR */

@keyframes flotar{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-8px);
}

100%{
transform:translateY(0px);
}

}

/* MENSAJE */

.mensaje{

width:85%;

margin:50px auto;

background:white;

padding:50px;

border-radius:30px;

text-align:center;

box-shadow:0 0 20px rgba(0,0,0,0.15);
}

.mensaje h2{

color:#ff4fa3;

font-size:40px;

margin-bottom:20px;
}

.mensaje p{

font-size:24px;

line-height:1.7;

color:#444;
}

/* FOOTER */

footer{

text-align:center;

padding:40px;

font-size:35px;

font-weight:bold;

color:#ff4fa3;
}

/* FLORES */

.flor{

position:fixed;

top:-50px;

animation:caer linear infinite;

z-index:999;
}

@keyframes caer{

0%{

transform:translateY(-50px) rotate(0deg);
}

100%{

transform:translateY(120vh) rotate(360deg);
}

}

/* RESPONSIVE */

@media(max-width:900px){

.collage{

column-count:2;
}

}

@media(max-width:600px){

header{

font-size:34px;
}

.subtitulo{

font-size:20px;
}

.collage{

column-count:1;
}

.mensaje{

width:92%;

padding:30px;
}

.mensaje h2{

font-size:28px;
}

.mensaje p{

font-size:20px;
}

footer{

font-size:28px;
}

.boton-musica button{

font-size:18px;

padding:15px 20px;
}

}

</style>

</head>

<body>

<!-- AUDIO -->

<audio id="musica" loop>

<source src="musica.mp3" type="audio/mpeg">

</audio>

<header>

🌸 Feliz día Mamás de primaria 🌸

</header>

<div class="subtitulo">

Un regalo hecho con mucho amor ❤️

</div>

<!-- BOTON -->

<div class="boton-musica">

<button onclick="iniciarMusica()">

🎵 Escucha esta canción para ti mamá 🎵

</button>

</div>

<!-- COLLAGE -->

<div class="collage" id="collage">

</div>

<!-- MENSAJE -->

<div class="mensaje">

<h2>

❤️ ¡ Gracias ! ❤️

</h2>

<p>

Gracias por todo su amor, paciencia y dedicación.  
Gracias por acompañar, enseñar y cuidar siempre con tanto cariño.  

Este pequeño detalle fue preparado con mucho amor para ustedes 🌸

</p>

</div>

<footer>

🌸 Feliz Día de las Madres 🌸

</footer>

<script>

/* MUSICA */

function iniciarMusica(){

const audio=document.getElementById("musica");

audio.volume=0.5;

audio.play();
}

/* FLORES */

for(let i=0;i<25;i++){

let flor=document.createElement("div");

flor.innerHTML="🌸";

flor.classList.add("flor");

flor.style.left=Math.random()*100+"vw";

flor.style.fontSize=(Math.random()*25+15)+"px";

flor.style.animationDuration=(Math.random()*10+8)+"s";

flor.style.opacity=Math.random();

document.body.appendChild(flor);
}

/* IMAGENES AUTOMATICAS */

const collage=document.getElementById("collage");

for(let i=1;i<=100;i++){

let img=document.createElement("img");

img.src=`foto${i}.jpeg`;

img.onerror=function(){

this.remove();
};

collage.appendChild(img);
}

</script>

</body>

</html>
